<p-card header="">
    <div class="list_principle_header">
        <diV class="list_header_title">
            <h2>Materias</h2>
            <span style="font-size: 14px">Lista de Materias</span>
        </diV>
        <div class="list_botoes">
            <p-button label="Nova Materia" routerLink="/cadastrar-materias" icon="pi pi-plus" iconPos="left" />
        </div>
    </div>
    <div class="card">
        <p-table #dt2 [value]="listaMaterias" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]"
            [loading]="loading" [paginator]="true"
            [globalFilterFields]="[
            'nome', 
            'ativo', 
            'dataCriacao']"
            [tableStyle]="{ 'width': '100%',  }">
            <ng-template #caption>
                    <p-iconfield>
                        <p-inputicon>
                            <i class="pi pi-search"></i>
                        </p-inputicon>
                        <input pInputText type="text" [(ngModel)]="searchValue"
                            (input)="dt2.filterGlobal([searchValue], 'contains')" placeholder="Pesquisar" />
                    </p-iconfield>
            </ng-template>
            <ng-template #header>
                <tr class="tr_header">
                    <th style="width:45%">Materia</th>
                    <th style="width:25%">Ativo</th>
                     <th style="width:25%">Data de criação</th>
                    <th style="width:5%">Ações</th>
                </tr>

            </ng-template>
            <ng-template #body let-materia>
                <tr class="item_list" >
                    <td>
                        <div >
                            <span>{{materia.nome}}</span>
                        </div>
                    </td>
                    <td>
                        <div>
                            <span [ngClass]="getSituacaoClass(materia.ativo)"> {{ getSituacao(materia.ativo) }} </span>
                        </div>
                    </td>

                    <td>
                        <div>
                            <span>  {{ materia.dataCriacao | date:"dd/mm/yyyy 'às' hh:mm"  }}</span>
                        </div>
                    </td>
                    <td>
                            <div class="menu_acoes">
                                <p-menu #menu [model]="opcoesDeAcoes" [appendTo]="'body'" [popup]="true">
                                    <ng-template #item let-opcao>
                                        <ng-container *ngIf="opcao.route; else elseBlock">
                                            <a class="p-menu-item-link" [routerLink]='[opcao.route, materia.id]'>
                                                <span [class]="opcao.icon"></span>
                                                <span class="ml-2">{{ opcao.label }}</span>
                                            </a>
                                        </ng-container>
                                        <ng-template #elseBlock>
                                            <a [href]="opcao.url" class="p-menu-item-link">
                                                <span [class]="opcao.icon"></span>
                                                <span class="ml-2">{{ opcao.label }}</span>
                                            </a>
                                        </ng-template>
                                    </ng-template>
                                </p-menu>
                                <p-button class="botao_acoes_lista" (click)="abrirMenu($event, materia.id)" icon="pi pi-ellipsis-h"></p-button>
                            </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template class="mensagemVazia" #emptymessage>
                <tr>
                    <td colspan="5">Nenhum resultado encontrado</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</p-card>


<p-toast />

<p-toast />
<p-confirmdialog />
