<div class="container-preview">
  <iframe class="preview-file" *ngIf="isPDF && safePdfUrl" [src]="safePdfUrl">
  </iframe>
  <div *ngIf="isImage">
    <div #previewContainer class="preview-image" *ngIf="safeImageUrl">
      <img #previewImage [src]="safeImageUrl">
    </div>
  </div>
      <p-button label="Gerar PDF" (onClick)="gerarArquivoComImagem()">
    </p-button>
</div>
