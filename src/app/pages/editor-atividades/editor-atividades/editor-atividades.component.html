<div class="editor-atividade-container">
  <div class="canvas">
    <div *ngFor="let item of elementos" class="elemento draggable"
      [class.selecionado]="item.id === elementoSelecionadoId" (click)="selecionarElemento(item.id)"
      [attr.data-id]="item.id" [ngStyle]="getStyle(item)">

      <img [src]="item.src" [width]="item.width" [height]="item.height" />

      <!-- AÇÕES -->
      <div *ngIf="item.id === elementoSelecionadoId" class="acoes">

        <button (click)="removerElemento(item.id); $event.stopPropagation()">❌</button>
        <button (click)="rotacionarElemento(item.id); $event.stopPropagation()">🔄</button>
      </div>
    </div>
  </div>
</div>
